<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: sans-serif;
      background: #e8f5e9;
      text-align: center;
    }

    p{
      font-size: 20px;
    }

    .card {
      position: relative;
      background: linear-gradient(to bottom right, rgb(224, 255, 224) 0%, rgb(216, 255, 216) 50%, rgb(192, 255, 192) 100%);
      padding: 20px;
      margin: 20px auto;
      width: 340px;
      min-height: 200px;
      box-shadow: 10px 10px 0px green;
      border-left: solid 10px rgb(240, 255, 240);
      border-top: solid 10px rgb(216, 255, 216);
      border-right: solid 10px rgb(112, 208, 112);
      border-bottom: solid 10px rgb(128, 224, 128);
      overflow: hidden;
      transition: 0.2s ease;
    }
    .card::before {
      content: '';
      width: 100%;
      height: 340px;
      position: absolute;
      top: 0;
      left: -150%;
      z-index: 2;
      display: block;
      background: -webkit-linear-gradient(left, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.8) 50%, rgba(255, 255, 255, 0) 100%);
      background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
      -webkit-transform: skewX(-45deg);
      transform: skewX(-45deg);
      color: transparent;
      animation: shine 10s infinite ease-in-out;
    }
    .card::after{
      content: '';
      position: absolute;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 10px 10px, 10px calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 10px, 10px 10px, 0 0);
      width:calc(100% - 20px);
      height:calc(100% - 20px);
      left:10px;
      top:10px;
      box-sizing: border-box;
      border-left: solid 10px rgb(0, 144, 0);
      border-top: solid 10px rgb(0, 176, 0);
      border-right: solid 10px white;
      border-bottom: solid 10px rgb(240, 255, 240);
    }
    @keyframes shine {
      10% {
        left: 150%;
        opacity: 1;
      }
      100% {
        left: 150%;
        opacity: 0;
      }
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      font-size: 20px;
    }

    button.primary {
      background: #4caf50;
    }
    button.secondary {
      background: #a5d6a7;
    }

    input{
      font-size: 20px;
    }

    .answer{
      display: none;
    }
  </style>
  </head>
  <body>

    <h1>復習カード</h1>

    <div id="cards" style="display: flex;justify-content:space-evenly;flex-wrap: wrap;"></div>

    <button onclick="loadCards()">更新</button>

    <hr>

    <h2>カード追加</h2>
    <input id="front" placeholder="問題"><br>
    <input id="back" placeholder="答え"><br>
    <button onclick="addCard()">追加</button>

    <script>
      let ok = true;
      const API_URL = "https://script.google.com/macros/s/AKfycbziO8ym7i0xpJMKmvTAhc46wnq6wZ5RNypU7wmcMPcCum6qPlwxQAre1J96G7E1EfQMPA/exec";

      async function loadCards() {
        console.log("loadCards")
        if(ok){
          ok = false;
          fetch(API_URL, {
            headers: {
              'Content-Type': "application/x-www-form-urlencoded",
            }}
          ).then((res) => {
            res.json().then(received_cards => {
              console.log(localStorage["cards"] = JSON.stringify(received_cards));
            });
          });
          setTimeout(() => {
            ok = true;
            fetch(API_URL, {
              headers: {
                'Content-Type': "application/x-www-form-urlencoded",
              }}
            ).then((res) => {
              res.json().then(received_cards => {
                console.log(localStorage["cards"] = JSON.stringify(received_cards));
              });
            });
          }, 5000);
        }
      
        const container = document.getElementById("cards");
        container.innerHTML = "";
        let cards = [];
        if(localStorage["cards"]){
          cards = JSON.parse(localStorage["cards"])
          console.log("cards", cards)

          let i = 0;
          for(let card of cards){
            if(i == 6)break;
            const div = document.createElement("div");
            const div2 = document.createElement("div");
            div.className = "card";

              // <button onclick="showAnswer('${card.back}', this)">答えを見る</button>
            div.innerHTML = `
              <p>${card.front}</p>
              <p class="answer">${card.back}</p>
              <button onclick="review(${card.id}, true)">覚えた</button>
              <button class="secondary" onclick="review(${card.id}, false)">忘れた</button>
            `;

            div.onclick = () => showAnswer(div);
            div2.appendChild(div);
            container.appendChild(div2);
            i += 1;
          };
          localStorage["cards"] = JSON.stringify(cards.slice(i).concat(cards.slice(0, i)));
        }
      }

      function showAnswer(div) {
        console.log(div)
        div.style.transform = "scaleX(0%)";
        setTimeout(() => {
          div.style.transform = "scaleX(100%)";
          if(div.querySelector("p").style.display != "none"){
            div.querySelector("p").style.display = "none";
            div.querySelector(".answer").style.display = "block";
          } else {
            div.querySelector("p").style.display = "block";
            div.querySelector(".answer").style.display = "none";            
          }
        }, 200);
      }

      async function addCard() {
        const front = document.getElementById("front").value;
        const back = document.getElementById("back").value;
        console.log("addCard")

        await fetch(API_URL, {
          method: "POST",
          headers: {
            'Content-Type': "application/x-www-form-urlencoded",
          },
          body: JSON.stringify({
            type: "add",
            front: front,
            back: back
          })
        });
      }

      async function review(id, correct) {
        console.log("review")
        await fetch(API_URL, {
          method: "POST",
          headers: {
            'Content-Type': "application/x-www-form-urlencoded",
          },
          body: JSON.stringify({
            type: "review",
            id: id,
            correct: correct
          })
        });
      }

      loadCards();
    </script>
  </body>
</html>
