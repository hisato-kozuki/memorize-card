<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: sans-serif;
      background: #e8f5e9;
      text-align: center;
    }

    p{
      font-size: 20px;
    }

    .card {
      position: relative;
      background: linear-gradient(to bottom right, rgb(255, 255, 255) 0%, rgb(248, 255, 248) 50%, rgb(224, 255, 224) 100%);
      padding: 20px;
      margin: 20px auto;
      width: 340px;
      box-shadow: 10px 10px 0px white inset, 10px 10px 0px green;
      /* border: solid 10px green; */
      overflow: hidden;
    }
    .card::before {
      content: '';
      width: 100%;
      height: 340px;
      position: absolute;
      top: 0;
      left: -150%;
      z-index: 2;
      display: block;
      background: -webkit-linear-gradient(left, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.8) 50%, rgba(255, 255, 255, 0) 100%);
      background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
      -webkit-transform: skewX(-45deg);
      transform: skewX(-45deg);
      color: transparent;
      animation: shine 10s infinite ease-in-out;
    }
    .card::after{
      content: '';
      position: absolute;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 10px 10px, 10px calc(100% - 10px), calc(100% - 10px) calc(100% - 10px), calc(100% - 10px) 10px, 10px 10px, 0 0);
      width:calc(100% - 20px);
      height:calc(100% - 20px);
      left:10px;
      top:10px;
      box-sizing: border-box;
      border-left: solid 10px rgb(0, 192, 0);
      border-top: solid 10px rgb(0, 192, 0);
      border-right: solid 10px white;
      border-bottom: solid 10px white;
    }
    @keyframes shine {
      10% {
        left: 150%;
        opacity: 1;
      }
      100% {
        left: 150%;
        opacity: 0;
      }
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
    }

    button.secondary {
      background: #a5d6a7;
    }
  </style>
  </head>
  <body>

    <h1>復習カード</h1>

    <div id="cards" style="display: flex;justify-content:space-evenly;flex-wrap: wrap;"></div>

    <button onclick="loadCards()">更新</button>

    <hr>

    <h2>カード追加</h2>
    <input id="front" placeholder="問題"><br>
    <input id="back" placeholder="答え"><br>
    <button onclick="addCard()">追加</button>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbw-tGVBSM-rkBhMcbp_HjZIxCGQ08aQ4xldvBDXI9CmDICozr3Vu0AJedJj-YrvCUbzKA/exec";

      async function loadCards() {
        console.log("loadCards")
        const res = await fetch(API_URL, {
          headers: {
            'Content-Type': "application/x-www-form-urlencoded",
          }}
        );
        const cards = await res.json();
        console.log("cards", cards)

        const container = document.getElementById("cards");
        container.innerHTML = "";

        cards.forEach(card => {
          const div = document.createElement("div");
          const div2 = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <p>${card.front}</p>
            <button onclick="showAnswer('${card.back}', this)">答えを見る</button>
            <div class="answer"></div>
            <button onclick="review(${card.id}, true)">覚えた</button>
            <button class="secondary" onclick="review(${card.id}, false)">忘れた</button>
          `;

          div2.appendChild(div);
          container.appendChild(div2);
        });
      }

      function showAnswer(answer, btn) {
        btn.nextElementSibling.innerHTML = answer;
      }

      async function addCard() {
        const front = document.getElementById("front").value;
        const back = document.getElementById("back").value;
        console.log("addCard")

        await fetch(API_URL, {
          method: "POST",
          headers: {
            'Content-Type': "application/x-www-form-urlencoded",
          },
          body: JSON.stringify({
            type: "add",
            front: front,
            back: back
          })
        });

        loadCards();
      }

      async function review(id, correct) {
        console.log("review")
        await fetch(API_URL, {
          method: "POST",
          headers: {
            'Content-Type': "application/x-www-form-urlencoded",
          },
          body: JSON.stringify({
            type: "review",
            id: id,
            correct: correct
          })
        });
      }

      loadCards();
    </script>
  </body>
</html>
